name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out app repo
        uses: actions/checkout@v4

      - name: Check out dj1000 converter library
        uses: actions/checkout@v4
        with:
          repository: oleyb/dj1000-converter-lib
          path: vendor-lib

      - name: Check out emsdk
        uses: actions/checkout@v4
        with:
          repository: emscripten-core/emsdk
          path: emsdk

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install and activate emsdk
        working-directory: emsdk
        run: |
          ./emsdk install latest
          ./emsdk activate latest

      - name: Install app dependencies
        run: npm ci

      - name: Build dj1000 WASM vendor bundle
        run: |
          source "$GITHUB_WORKSPACE/emsdk/emsdk_env.sh"
          emcmake cmake -S "$GITHUB_WORKSPACE/vendor-lib" -B "$GITHUB_WORKSPACE/vendor-lib/build-wasm" -G Ninja \
            -DDJ1000_BUILD_WASM=ON \
            -DDJ1000_BUILD_CLI=OFF \
            -DDJ1000_BUILD_TESTS=OFF
          cmake --build "$GITHUB_WORKSPACE/vendor-lib/build-wasm" --target dj1000_wasm

      - name: Build web app
        env:
          DJ1000_LIB_DIR: ./vendor-lib
          GITHUB_PAGES: "true"
        run: npm run build:pages

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
