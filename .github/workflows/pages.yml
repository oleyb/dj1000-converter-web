name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out app repo
        uses: actions/checkout@v5

      - name: Check out dj1000 converter library
        uses: actions/checkout@v5
        with:
          repository: oleyb/dj1000-converter-lib
          path: vendor-lib

      - name: Check out emsdk
        uses: actions/checkout@v5
        with:
          repository: emscripten-core/emsdk
          path: emsdk

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Download Adobe DNG SDK
        run: |
          curl -L https://www.adobe.com/go/dng_sdk -o "$RUNNER_TEMP/dng_sdk.zip"
          unzip -q "$RUNNER_TEMP/dng_sdk.zip" -d "$GITHUB_WORKSPACE"
          test -f "$GITHUB_WORKSPACE/dng_sdk_1_7_1/dng_sdk/source/dng_negative.h"

      - name: Install and activate emsdk
        working-directory: emsdk
        run: |
          ./emsdk install latest
          ./emsdk activate latest

      - name: Install app dependencies
        run: npm ci

      - name: Build dj1000 WASM vendor bundle
        run: |
          source "$GITHUB_WORKSPACE/emsdk/emsdk_env.sh"
          emcmake cmake -S "$GITHUB_WORKSPACE/vendor-lib" -B "$GITHUB_WORKSPACE/vendor-lib/build-wasm" -G Ninja \
            -DDJ1000_BUILD_WASM=ON \
            -DDJ1000_BUILD_CLI=OFF \
            -DDJ1000_BUILD_TESTS=OFF \
            -DDJ1000_ENABLE_ADOBE_DNG_SDK=ON \
            -DDJ1000_ADOBE_DNG_SDK_ROOT="$GITHUB_WORKSPACE/dng_sdk_1_7_1"
          cmake --build "$GITHUB_WORKSPACE/vendor-lib/build-wasm" --target dj1000_wasm

      - name: Verify WASM RAW DNG support
        run: |
          node --input-type=module <<'EOF'
          import { pathToFileURL } from "node:url";
          const helperPath = `${process.env.GITHUB_WORKSPACE}/vendor-lib/build-wasm/native/dj1000_wasm_api.mjs`;
          const modulePath = `${process.env.GITHUB_WORKSPACE}/vendor-lib/build-wasm/native/dj1000_wasm.mjs`;
          const { createDj1000WasmConverter } = await import(pathToFileURL(helperPath).href);
          const converter = await createDj1000WasmConverter({
            locateFile(file) {
              return new URL(file, pathToFileURL(modulePath));
            },
          });
          if (!converter.supportsDng) {
            throw new Error("Adobe-backed RAW DNG support is missing from the Pages WASM bundle");
          }
          EOF

      - name: Build web app
        env:
          DJ1000_LIB_DIR: ./vendor-lib
          GITHUB_PAGES: "true"
        run: npm run build:pages

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
